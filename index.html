<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="description" content="Hub centralizado para crear avatares UGC ultrarrealistas con IA. Genera guiones, avatares, vídeos y anuncios sin cámara." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/styles/index.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">

        </div>
        <span class="brand-text">UGC Hub</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">

        </a>

        </a>

        <div class="api-status" id="api-status">
          <span class="status-dot"></span>
          <span class="status-text">API sin configurar</span>

    <!-- Main Content -->
    <main id="main-content" class="main-content">
      <div id="page-container"></div>
    </main>
  </div>

  <!-- Toast notification container -->
  <div id="toast-container" class="toast-container"></div>

  <script type="module" src="/src/main.js"></script>
