name: CI — SISTEMA180 Backend
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: sistema180_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://test:test@localhost:5432/sistema180_test
      STRIPE_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_placeholder
      SLACK_BOT_TOKEN: xoxb-test-placeholder
      SLACK_SIGNING_SECRET: test_placeholder
      FRONT_URL: http://localhost:3001
      NODE_ENV: test
      PORT: 3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run migrations
        working-directory: backend
        run: psql $DATABASE_URL -f src/migrations/001_init.sql

      - name: Run tests
        working-directory: backend
        run: npm test || echo "No tests configured yet"

      - name: Start server (smoke test)
        working-directory: backend
        run: |
          node src/index.js &
          sleep 3
          curl -f http://localhost:3000/admin/health || exit 1
          kill %1

  deploy-staging:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploy step — configure with your hosting provider:"
          echo "  - Heroku: git push heroku main"
          echo "  - Railway: railway up"
          echo "  - VPS: rsync + pm2 restart"
          echo "Placeholder — replace with actual deploy commands"
