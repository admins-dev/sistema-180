<!-- Email Template: Payout Notification -->
<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Pago procesado</title>
</head>

<body style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
    <div style="text-align: center; padding: 20px 0; border-bottom: 2px solid #78E0B9;">
        <h1 style="color: #4C8CFF; margin: 0;">SISTEMA<span style="color: #78E0B9;">180</span></h1>
    </div>
    <div style="padding: 30px 0;">
        <h2>💰 Pago procesado</h2>
        <p>Hola {{AFFILIATE_NAME}},</p>
        <p>Te confirmamos que hemos procesado tu pago de comisiones:</p>
        <div style="background: #f0faf4; border-left: 4px solid #78E0B9; padding: 15px 20px; margin: 20px 0;">
            <p style="font-size: 24px; font-weight: bold; color: #2d7d4f; margin: 0;">{{AMOUNT}}€</p>
            <p style="color: #666; margin: 5px 0 0 0;">Referencia: {{TRANSFER_ID}}</p>
        </div>
        <p>El dinero llegará a tu cuenta en las próximas <strong>24-48 horas laborables</strong>.</p>
        <p style="color: #666; font-size: 14px;">Si tienes alguna duda, responde a este email.</p>
    </div>
    <div style="border-top: 1px solid #eee; padding-top: 15px; text-align: center; color: #999; font-size: 12px;">
        <p>SISTEMA180 © 2026</p>
    </div>
</body>

</html>
